<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Learn to Fly Series</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">Gamehost</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <div>
      <h2>What learn to fly game do you want to play:</h2>
      <div class="game-grid">
        <button id="LTF1" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/learn-to-fly.png"
              alt="Learn To Fly 1"
            />
          </div>
          <span>Learn To Fly 1</span>
        </button>

        <button id="LTF2" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/learn-to-fly-2.png"
              alt="Learn To Fly 2"
            />
          </div>
          <span>Learn To Fly 2</span>
        </button>

        <button id="LTF3" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/learn-to-fly-3.png"
              alt="Learn To Fly 3"
            />
          </div>
          <span>Learn To Fly 3</span>
        </button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/supremebabyman/gamehost@main/script.js"></script>
  </body>
</html>

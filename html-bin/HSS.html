<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Henry Stickmin Series</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">Gamehost UBG</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <!-- Nav toggle button -->
    <div>
      <h2>What Henry Stickman game do you want to play :</h2>
      <div class="game-grid">
        <button id="hsbtb" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/henry-stickmin-breaking-the-bank.png"
              alt="Breaking the Bank"
            />
          </div>
          <span>Breaking the Bank</span>
        </button>

        <button id="hsetp" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/henry-stickmin-escaping-the-prison.png"
              alt="Escaping the Prison"
            />
          </div>
          <span>Ecaping the Prison</span>
        </button>

        <button id="hsstd" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/henry-stickmin-stealing-the-diamond.png"
              alt="Stealing the Diamond"
            />
          </div>
          <span>Stealing the Diamond</span>
        </button>

        <button id="hsita" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/henry-stickmin-infiltrating-the-airship.png"
              alt="Infiltrating the Airship"
            />
          </div>
          <span>Infiltrating the Airship</span>
        </button>

        <button id="hsftc" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/henry-stickmin-fleeing-the-complex.png"
              alt="Fleeing the Complex"
            />
          </div>
          <span>Fleeing the Complex</span>
        </button>
      </div>
    </div>
    <script src="../script.js"></script>
  </body>
</html>

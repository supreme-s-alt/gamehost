<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Papa Louies's games</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">Gamehost</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <div>
      <h2>What Papa's game do you want to play:</h2>
      <div class="game-grid">
        <button id="paburg" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/papa-burg.png"
              alt="Papa's Burgeria"
            />
          </div>
          <span>Papa's Burgeria</span>
        </button>

        <button id="pafree" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/papa-freeze.png"
              alt="Papa's Freezeria"
            />
          </div>
          <span>Papa's Freezeria</span>
        </button>

        <button id="padog" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/papa-hotdog.png"
              alt="Papa's Hot Doggeria"
            />
          </div>
          <span>Papa's Hot Doggeria</span>
        </button>

        <button id="palu" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/papa-louies.png"
              alt="Papa Louie"
            />
          </div>
          <span>Papa Louie</span>
        </button>

        <button id="papan" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/papa-pancake.png"
              alt="Papa's Pancakeria"
            />
          </div>
          <span>Papa's Pancakeria</span>
        </button>

        <button id="papiz" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/papa-pizza.png"
              alt="Papa's Pizzeria"
            />
          </div>
          <span>Papa's Pizzeria</span>
        </button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/supremebabyman/gamehost@main/script.js"></script>
  </body>
</html>

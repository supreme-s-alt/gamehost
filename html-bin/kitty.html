<!DOCTYPE html>
<html>
  <head>
    <title>Strikeforce Kitty Series</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">gamehost.dev</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <!-- Nav toggle button -->
    <div>
      <h2>What Strikeforce Kitty game do you want to play:</h2>
      <div class="game-grid">
        <button id="skitty" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/strikeforce-kitty-1.png"
              alt="Strikeforce Kitty 1"
            />
          </div>
          <span>Strikeforce Kitty 1</span>
        </button>

        <button id="skitty2" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/strikeforce-kitty-2.png"
              alt="Strikeforce Kitty 2"
            />
          </div>
          <span>Strikeforce Kitty 3</span>
        </button>

        <button id="skittyl" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/strikeforce-kitty-league.png"
              alt="Strikeforce Kitty League"
            />
          </div>
          <span>Strikeforce Kitty League</span>
        </button>

        <button id="skittyls" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/strikeforce-kitty-last-stand.png"
              alt="Strikeforce Kitty Last Stand"
            />
          </div>
          <span>Strikeforce Kitty Last Stand</span>
        </button>
      </div>
    </div>
    <script src="../script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Hard Mode Sans</title>
  <body>
    <!--Hard.HTML is wild-->
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">Gamehost</h1>
      <div class="nav-links">

        <a id="credits">Credits</a>

    </nav>
    <!-- Nav toggle button -->
    <button id="nav-toggle" class="nav-toggle">
      <img src="../images/navbutton.png" alt="nav-toggle" />
    </button>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <iframe
      id="player"
      src="https://hard-mode-sans-private-customization.onrender.com"
      frameborder="0"
      scrolling="auto"
      id="player"

    <div>
      <div class="controls">
        <button id="fullscreen">Fullscreen</button>
      </div>
    </div>
    <script src="../script.js"></script>

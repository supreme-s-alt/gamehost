<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Duck Life Series</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">Radio-A's Unblocked Games</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <!-- Nav toggle button -->
    <div>
      <h2>What Duck Life do you want to play:</h2>
      <div class="game-grid">
        <button id="dl1" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/duck-life-1.png"
              alt="Duck Life 1"
            />
          </div>
          <span>Duck Life 1</span>
        </button>

        <button id="dl2" class="game-btn">

            />
          </div>
          <span>Duck Life 2</span>
        </button>

        <button id="dl3" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/duck-life-3.png"
              alt="Duck Life 3"
            />
          </div>
          <span>Duck Life 3</span>
        </button>

        <button id="dl4" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/duck-life-4.png"
              alt="Duck Life 4"
            />
          </div>
          <span>Duck Life 4</span>
        </button>

    </div>
    <script src="../script.js"></script>

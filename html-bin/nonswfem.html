<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>TEST</title>
  <body>
    <nav id="main-nav">
        <div class="dropdown">
          <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
        </div>
        <h1 id="home">Gamehost UBG</h1>
        <div class="nav-links">
          <a id="about">About</a>
          <a id="credits">Credits</a>
          <a id="uplog">Updates</a>
          <a id="gamesug">Suggestions</a>
        </div>
      </nav>
    <div id="gameContainer" style="width: 918px; height: 516px; top: 95px; left: 0px;">
		<canvas id="unity-canvas" style="cursor: default; width: 918px; height: 516px;" width="1148" height="645"></canvas>
		<script src="https://www.rgshows.ru/games/semag/deepestsword/Build/WebBuilds.loader.js"></script>
		<script>
			createUnityInstance(document.querySelector("#unity-canvas"), {
				dataUrl: "https://www.rgshows.ru/games/semag/deepestsword/Build/WebBuilds.data",
				frameworkUrl: "https://www.rgshows.ru/games/semag/deepestsword/Build/WebBuilds.framework.js",
				codeUrl: "https://www.rgshows.ru/games/semag/deepestsword/Build/WebBuilds.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "Cosmic Adventure Squad",
				productName: "Deepest Sword",
				productVersion: "0.1.5c",
			}).then(function (instance) {
				var canvas = instance.Module.canvas;
				var container = canvas.parentElement;
				function onResize() {
					var w;
					var h;

					if (scaleToFit) {
						w = window.innerWidth;
						h = window.innerHeight;

						var r = 540 / 960;

						if (w * r > window.innerHeight) {
							w = Math.min(w, Math.ceil(h / r));
						}
						h = Math.floor(w * r);
					} else {
						w = 960;
						h = 540;
					}

					container.style.width = canvas.style.width = w + "px";
					container.style.height = canvas.style.height = h + "px";
					container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
					container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
				}

				var scaleToFit;
				try {
					scaleToFit = !!JSON.parse("");
				} catch (e) {
					scaleToFit = true;
				}
				window.addEventListener('resize', onResize);
				onResize();
			});
		</script>
    <div>
    <script src="https://www.rgshows.ru/games/semag/deepestsword/Build/WebBuilds.framework.js"></script>
    <div class="controls">
        <button id="fullscreen">Fullscreen</button>
    </div>
    <script src="../script.js"></script>
  </body>
</html>

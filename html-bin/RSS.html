<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Riddle School Series</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">Gamehost</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <!-- Nav toggle button -->
    <button id="nav-toggle" class="nav-toggle">
      <img src="../images/navbutton.png" alt="nav-toggle" />
    </button>
    <div>
      <h2>What Riddle School game do you want to play:</h2>
      <div class="game-grid">
        <button id="rs1" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/riddle-school-1.png"
              alt="Riddle School 1"
            />
          </div>
          <span>Riddle School 1</span>
        </button>

        <button id="rs2" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/riddle-school-2.png"
              alt="Riddle School 2"
            />
          </div>
          <span>Riddle School 2</span>
        </button>

        <button id="rs3" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/riddle-school-3.png"
              alt="Riddle School 3"
            />
          </div>
          <span>Riddle School 3</span>
        </button>

        <button id="rs4" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/riddle-school-4.png"
              alt="Riddle School 4"
            />
          </div>
          <span>Riddle School 4</span>
        </button>

        <button id="rs5" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/riddle-school-5.png"
              alt="Riddle School 5"
            />
          </div>
          <span>Riddle School 5</span>
        </button>

        <button id="rt1" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/riddle-transfer.png"
              alt="Riddle Transfer 1"
            />
          </div>
          <span>Riddle Transfer 1</span>
        </button>

        <button id="rt2" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/riddle-transfer-2.png"
              alt="Riddle Transfer 2"
            />
          </div>
          <span>Riddle Transfer 2</span>
        </button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/supremebabyman/gamehost@main/script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Undertale Mods</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">gamehost.dev</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <div>
      <h2>What Undertale mod do you want to play?</h2>
      <div class="game-grid">
        <button id="bts" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/bad-time-simulator-.png"
              alt="Bad Time Simulator"
            />
          </div>
          <span>Bad Time Simulator</span>
        </button>

        <button id="hard" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/hard-mode-sans-.png"
              alt="Hard Mode Sans"
            />
          </div>
          <span>Hard Mode Sans</span>
        </button>

        <button id="last" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/undertale-last-breath.png"
              alt="Last Breath"
            />
          </div>
          <span>Last Breath</span>
        </button>

        <button id="pat" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/pat-time-simulator.png"
              alt="Pat Time Simulator"
            />
          </div>
          <span>Pat Time Simulator</span>
        </button>

        <button id="underfell" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/underfell.png"
              alt="Underfell"
            />
          </div>
          <span>Underfell</span>
        </button>

        <button id="undyne" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/undyne-fight-simulator.png"
              alt="Undyne Fight Simulator"
            />
          </div>
          <span>Undyne Fight Simulator</span>
        </button>

        <button id="worst" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/worst-time-simulator.png"
              alt="Worst Time Simulator"
            />
          </div>
          <span>Worst Time Simulator</span>
        </button>
      </div>
    </div>
    <script src="../script.js"></script>
  </body>
</html>

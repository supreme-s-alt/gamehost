<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>TEST</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">Radio-A's Unblocked Games</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <!-- Nav toggle button -->
    <button id="nav-toggle" class="nav-toggle">
      <img src="../images/navbutton.png" alt="nav-toggle" />
    </button>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <!-- Centering Container -->
    <div>
      <div
        id="container-wrapper"
        style="display: flex; justify-content: center; align-items: center"
      >
        <div
          id="container"
          style="width: 900px; height: 675px"
          name="shockwave-flash"
          allowfullscreen="true"
        ></div>
      </div>
      <script type="text/javascript">
        function play() {
          const ruffle = window.RufflePlayer?.newest();
          if (!ruffle || !ruffle.createPlayer) {
            console.error("Ruffle is not loaded correctly.");
            return;
          }

          const player = ruffle.createPlayer();
          player.config = {
            autoplay: true,
            contextMenu: false,
            splashScreen: false,
            warnOnUnsupportedContent: false,
            allowScriptAccess: true,
            maxExecutionDuration: 30,
            allowFullscreen: true,
          };

          player.style.width = "100%";
          player.style.height = "100%";

          const container = document.getElementById("container");
          container.innerHTML = ""; // Clear any existing content
          container.appendChild(player);

          player.load("../elec.swf").then(() => {
            window.parent.postMessage({ type: "ruffleready" }, "*");
          });
        }

        play();
      </script>
    </div>
    <div class="controls">
      <button id="fullscreen">Fullscreen</button>
    <script src="../script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Riddle School Series</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">gamehost.dev</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <!-- Nav toggle button -->
    <button id="nav-toggle" class="nav-toggle">
      <img src="../images/navbutton.png" alt="nav-toggle" />
    </button>
    <div>
      <h2>Which Run game do you want to play?</h2>
      <div class="game-grid">

      <button id="run1" class="game-btn">
        <div class="img-wrap">
          <img
            id="Thumbnails"
            src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/run-1.png"
            alt="Run 1"
          />
        </div>
        <span>Run 1</span>
      </button>

      <button id="run2" class="game-btn">
        <div class="img-wrap">
          <img
            id="Thumbnails"
            src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/run-2.png"
            alt="Run 2"
          />
        </div>
        <span>Run 2</span>
      </button>

      <button id="run3" class="game-btn">
        <div class="img-wrap">
          <img
            id="Thumbnails"
            src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/run-3-.png"
            alt="Run 3"
          />
        </div>
        <span>Run 3</span>
      </button>
    </div>
    <script src="../script.js"></script>
  </body>
</html>

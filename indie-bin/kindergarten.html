<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  </head>
  <title>Kindergarten Series</title>
  <body>
    <!-- Navigation Bar -->
    <nav id="main-nav">
      <div class="dropdown">
        <button class="nav-toggle"><link src="../images/navbutton.png"></link></button>
      </div>
      <h1 id="home">Gamehost UBG</h1>
      <div class="nav-links">
        <a id="about">About</a>
        <a id="credits">Credits</a>
        <a id="uplog">Updates</a>
        <a id="gamesug">Suggestions</a>
      </div>
    </nav>
    <div>
      <h2>Which Kindergarten do you want to play?</h2>
      <div class="game-grid">
        <button id="kindergarten1" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/kindergarten-1.png"
              alt="Kindergarten 1"
            />
          </div>
          <span>Kindergarten 1</span>
        </button>
        <button id="kindergarten2" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/kindergarten-2.png"
              alt="Kindergarten 2"
            />
          </div>
          <span>Kindergarten 2</span>
        </button>
        <button id="kindergarten3" class="game-btn">
          <div class="img-wrap">
            <img
              id="Thumbnails"
              src="https://raw.githubusercontent.com/supremebabyman/Gamehost-files/refs/heads/main/Thumbnails/kindergarten-3.png"
              alt="Kindergarten 3"
            />
          </div>
          <span>Kindergarten 3</span>
        </button>
      </div>
    </div>

    <script src="../script.js"></script>
  </body>
</html>
